<!DOCTYPE html>
<html>
<head>
    <title>AI Skill Gap Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🚀 AI Skill Gap Analyzer</h1>

    <textarea id="resume" placeholder="Enter your skills OR upload resume"></textarea>

    <input type="file" id="file">

    <input type="text" id="jobRole" placeholder="Enter job role">

    <button onclick="analyze()">Analyze</button>

    <h2>Result:</h2>
    <pre id="output"></pre>
</div>

<script>
async function analyze() {
    const fileInput = document.getElementById("file").files[0];
    const resume = document.getElementById("resume").value;
    const jobRole = document.getElementById("jobRole").value;
    const output = document.getElementById("output");

    output.innerText = "Analyzing...";

    try {
        let response;

        if (fileInput) {
            const formData = new FormData();
            formData.append("file", fileInput);
            formData.append("jobRole", jobRole);

            response = await fetch("/analyze", {
                method: "POST",
                body: formData
            });

        } else {
            response = await fetch("/analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    resume: resume,
                    jobRole: jobRole
                })
            });
        }

        if (!response.ok) {
            throw new Error("Server error");
        }

        const data = await response.json();

        output.innerText =
            "Score: " + data.score + "%\n\n" +
            "Detected Skills: " + data.skills.join(", ") + "\n\n" +
            "Missing Skills: " + data.missing_skills.join(", ") + "\n\n" +
            "Roadmap:\n" + data.roadmap.join("\n");

    } catch (error) {
        output.innerText = "Error: " + error.message;
    }
}
</script>

</body>
</html>
